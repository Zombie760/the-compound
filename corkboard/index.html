  function showBeat(idx) {
    var beat = TOUR_BEATS[idx];
    if (!beat) return;
    document.getElementById("tour-title").textContent = beat.title;
    document.getElementById("tour-desc").textContent = beat.caption;
    var start = { x: state.x, y: state.y, k: state.k };

                y: -beat.camera.y * beat.camera.k + stage.clientHeight/2 - 80*beat.camera.k,
                k: beat.camera.k };

      var t = Math.min(1, (now - startTime) / 800);
      var ease = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
      state.x = start.x + (end.x - start.x) * ease;
      state.y = start.y + (end.y - start.y) * ease;
      state.k = start.k + (end.k - start.k) * ease;
      updateTransform();
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);

        desc.style.cssText = "font-family:'Lora',serif;font-size:12px;color:#b8ac90;";
        row.appendChild(desc);
        var src = makeEl("div", "", d.source || d.chapter || "");
        src.style.cssText = "font-family:'Courier Prime',monospace;font-size:9px;color:#666;margin-top:8px;";
        row.appendChild(src);
        docList.appendChild(row);
      });
    }
  });
  document.getElementById("close-library").addEventListener("click", function() { docLibrary.style.display = "none"; });

  var victimMode = false;
  document.getElementById("victim-toggle").addEventListener("click", function() {
    victimMode = !victimMode;
    this.classList.toggle("active", victimMode);
    var victimIds = ["e004","e006","e012"];
    victimIds.forEach(function(id) {
      var c = document.getElementById("card-" + id);
      if (c) c.classList.toggle("victim-highlight", victimMode);
    });
  });

})();
</script>
</body>
</html>
